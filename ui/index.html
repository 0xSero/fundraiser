<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compute Cluster Fund</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <p class="brand">Sybil Solutions</p>
      <div class="top-actions">
        <a class="top-link active" href="index.html">Fund</a>
        <a class="top-link" href="about.html">About</a>
        <a class="top-link" href="rules.html">Rules</a>
        <p class="status-live"><span class="status-dot"></span> Live</p>
      </div>
    </div>
  </header>

  <main class="split">
    <div class="split-left">
      <p class="tagline fade-up">GPU Compute Fund</p>
      <h1 class="hero-title fade-up delay-1">Fund the<br>infrastructure.</h1>

      <div id="meter" class="fade-up delay-3"></div>

      <div class="spacer"></div>

      <div class="fade-up delay-5" style="margin-top: 32px;">
        <p class="stream-label">Updates</p>
        <div id="updates"></div>
      </div>
    </div>

    <div class="split-right fade-up delay-2">
      <p class="form-label">Donate</p>
      <div id="donate"></div>
      <div class="spacer"></div>
    </div>
  </main>

  <footer class="footer">
    <p>Sybil Solutions &middot; Compute Cluster Fund &middot; 2026</p>
  </footer>

  <script src="app.js"></script>
